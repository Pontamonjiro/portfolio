# Public リポ portfolio を GitHub Pages へ自動デプロイする公式ワークフロー。
# Settings > Pages の Source を「GitHub Actions」にしておくこと（gh で設定済み）。
# main に push するたびにビルド→公開される。PAT不要（GITHUB_TOKEN で完結）。
# 公開URL: https://pontamonjiro.github.io/portfolio/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに（連続pushでも最新だけ反映）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        with:
          node-version: 22 # Astro 7 は Node 22 必須

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
